apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: webapp
  name: webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  strategy:
   type: RollingUpdate
   rollingUpdate:
     maxUnavailable: 0
     maxSurge: 1
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - image: nginx:1.28
        name: nginx
        resources: {}
status: {}
